name: rv-bi-dashboard
channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.11

  # ── Core geospatial (conda-forge — C library binaries required) ──────────
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - fiona>=1.9
  - rasterio>=1.3          # raster I/O (future extensions)
  - contextily>=1.4        # basemap tiles for matplotlib

  # ── Spatial statistics ────────────────────────────────────────────────────
  - libpysal>=4.9          # spatial weights (Queen contiguity)
  - esda>=2.5              # Moran's I, LISA (depends on libpysal)

  # ── Data science core ─────────────────────────────────────────────────────
  - numpy>=1.24,<2.0       # pin below 2.0 for rasterio 1.3.x compat
  - pandas>=2.0
  - scikit-learn>=1.3      # MinMaxScaler (opportunity gap score)
  - scipy>=1.11

  # ── Visualization ─────────────────────────────────────────────────────────
  - matplotlib>=3.7
  - plotly>=5.17
  - folium>=0.15

  # ── Notebook ──────────────────────────────────────────────────────────────
  - jupyterlab>=4.0
  - ipykernel
  - ipywidgets

  # ── Utilities ────────────────────────────────────────────────────────────
  - requests>=2.31
  - tqdm

  # ── pip-only packages (no conda-forge entry) ─────────────────────────────
  - pip
  - pip:
    - dash>=2.14
    - dash-leaflet>=1.0
    - census>=0.8.19        # Census API Python wrapper

# ── Environment notes ────────────────────────────────────────────────────────
# Create:   conda env create -f environment.yml
# Activate: conda activate rv-bi-dashboard
# Update:   conda env update -f environment.yml --prune
# Remove:   conda env remove -n rv-bi-dashboard
#
# Tested on: macOS 14 (Apple Silicon + Intel), Ubuntu 22.04, Windows 11 WSL2
# Python:    3.11 recommended — 3.10 also supported
# numpy:     Pinned <2.0 for rasterio 1.3.x binary compatibility
#            Upgrade to numpy>=2.0 only after upgrading to rasterio>=1.4